<!DOCTYPE html>
<html>
<head>
    <title>Phishing Blocked</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #ff4d4d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            border: 2px solid #ff4d4d;
            border-radius: 15px;
            background: rgba(255, 77, 77, 0.1);
            max-width: 600px;
        }
        h1 { font-size: 3rem; margin-bottom: 0; }
        p { font-size: 1.2rem; color: #c9d1d9; }
        .reasons {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #161b22;
            border-radius: 8px;
            color: #8b949e;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #ff4d4d;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #e60000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Phishing Alert!</h1>
        <p>This site has been blocked by <strong>PhishGuard Pro</strong>.</p>
        <div id="url" style="color: #58a6ff; font-weight: bold; margin-bottom: 20px;"></div>
        <div class="reasons" id="reasons">
            Checking risk factors...
        </div>
        <button onclick="window.history.back()">Go Back to Safety</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const blockedUrl = urlParams.get('url');
        const reasons = urlParams.get('reasons');
        
        document.getElementById('url').innerText = blockedUrl || "Unknown URL";
        if (reasons) {
            const reasonsList = reasons.split('|').map(r => `<li>${r}</li>`).join('');
            document.getElementById('reasons').innerHTML = `<strong>Reasons:</strong><ul>${reasonsList}</ul>`;
        }
    </script>
</body>
</html>
